<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Person</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-card{
            width: 350px;
            background: #585e68;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .contact-card img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000000;
            margin-bottom: 20px;
        }

        .contact-card h1{
            color: white;
            margin-bottom: 10px;
        }

        .contact-card p{
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .btn{
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #3f494d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover{
            background: #0ea5e9;
        }
    </style>
</head>
<body background="/IMAGE/BG&LOGO/logos.png">

    <div class="contact-card">
        <img src="/IMAGE/BG&LOGO/LOGO ROG.png" alt="Foto Profil">

        <h1>AL ROG</h1>

        <p>Email: alrog@example.com</p>
        <p>WhatsApp: 0812-3456-7890</p>
        <p>Instagram: @alrogdeigital</p>
        <p>Alamat: jl.Parter</p>
    
    </div>
    <a href="../index.html"><img src="/IMAGE/BG&LOGO/BACK1.png" width="200" height="200"></a>

</body>
</html>
