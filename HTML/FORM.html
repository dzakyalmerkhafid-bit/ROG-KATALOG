<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ORDER FORM</title>

    <link rel="stylesheet" href="../CSS/form.css">

</head>
<body>

    <img src="../IMAGE/BG&LOGO/RG2.png" width="500" class="logo" >

<table cellpadding="20" cellspacing="0">

    <tr>
        <th colspan="2" class="order-btn">
            FORM PEMBELIAN PRODUK ROG
        </th>
    </tr>

    <tr>
        <td>PRODUK</td>

        <td>
            <select id="produk">
                <option>ROG FLOW Z13</option>
                <option>ROG ZEPHYRUS G14</option>
                <option>ROG STRIX SCAR 18</option>
                <option>ROG STRIX G16</option>
                <option>ROG PHONE 9 PRO</option>
                <option>ROG STRIX OLED XG34WCDG</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>NAMA</td>
        <td>
            <input type="text" placeholder="Masukkan Nama">
        </td>
    </tr>

    <tr>
        <td>NO WHATSAPP</td>
        <td>
            <input type="text" placeholder="08xxxxxxxxxx">
        </td>
    </tr>

    <tr>
        <td>ALAMAT</td>
        <td>
            <textarea rows="4"></textarea>
        </td>
    </tr>

    <tr>
        <td>PEMBAYARAN</td>

        <td>
            <select>
                <option>BCA</option>
                <option>MANDIRI</option>
                <option>BNI</option>
                <option>BRI</option>
                <option>CIMB</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>JUMLAH</td>
        <td>
            <input type="number" value="1" min="1">
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">

            <button id="orderBtn" class="order-btn">
                PESAN SEKARANG
            </button>

        </td>
    </tr>

</table>
<td>
    <a href="../HTML/listproduk.html"><button class="order-btn">BACK</button>
</td>


<script src="../JS/script.js"></script>

</body>
</html>
